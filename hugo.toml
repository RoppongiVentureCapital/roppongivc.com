baseURL = "https://roppongivc.com/"
title = "六本木ベンチャーキャピタル"
languageCode = "ja"
defaultContentLanguage = "ja"
enableRobotsTXT = true
paginate = 12

[languages]
  [languages.ja]
    languageName = "日本語"
    weight = 1
    title = "六本木ベンチャーキャピタル"
    [languages.ja.params]
      description = "日本最高峰のSTEM頭脳に、世界最高峰の起業家体験を。"
  [languages.en]
    languageName = "English"
    weight = 2
    title = "Roppongi Venture Capital"
    [languages.en.params]
      description = "World-class entrepreneurial experiences for Japan's brightest STEM minds."

[params]
  tagline = "日本最高峰のSTEM頭脳に、世界最高峰の起業家体験を。"
  taglineEn = "World-class entrepreneurial experiences for Japan's brightest STEM minds."
  ogImage = "/img/og-default.png"

[menus]
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menus.main]]
    name = "Incubation"
    url = "/incubation/"
    weight = 2
  [[menus.main]]
    name = "Media"
    url = "/blog/"
    weight = 3
  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"
  pillar = "pillars"
