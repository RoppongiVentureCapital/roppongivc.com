{{ define "main" }}
<section class="list-page">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}
  </div>
  <div class="list-grid">
    {{ range .Pages }}
    <article class="card">
      <a href="{{ .RelPermalink }}">
        <div class="card-body">
          <time>{{ .Date.Format "2006.01.02" }}</time>
          <h2>{{ .Title }}</h2>
          {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
        </div>
      </a>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
