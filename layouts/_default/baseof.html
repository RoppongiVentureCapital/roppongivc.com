<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
{{ block "head" . }}{{ end }}
</head>
<body>
<nav class="nav">
  <a href="{{ .Site.Home.RelPermalink }}" class="nav-logo">
    <img src="{{ "img/logo-wide.png" | relURL }}" alt="Roppongi VC" class="nav-logo-img">
  </a>
  <ul class="nav-links">
    {{ range .Site.Menus.main }}
    <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
    {{ end }}
  </ul>
</nav>
<main>{{ block "main" . }}{{ end }}</main>
<footer class="footer">
  <span>© {{ now.Year }} Roppongi Venture Capital</span>
  <span class="footer-note">当団体はファンド運用・投資勧誘を行っておりません。</span>
  <span>roppongivc.com</span>
</footer>
</body>
</html>
