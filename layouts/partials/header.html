<header class="site-header">
  <nav class="nav-container">
    <a href="/" class="logo">
      <span class="logo-text">ROPPONGI<br>VENTURE CAPITAL</span>
    </a>
    <button class="nav-toggle" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
      <li class="lang-switch">
        {{ if eq $.Lang "ja" }}
        <a href="{{ replace $.RelPermalink "/" "/en/" 1 }}">EN</a>
        {{ else }}
        <a href="{{ replace $.RelPermalink "/en/" "/" 1 }}">JP</a>
        {{ end }}
      </li>
    </ul>
  </nav>
</header>
<script>
document.querySelector('.nav-toggle').addEventListener('click', function() {
  document.querySelector('.nav-menu').classList.toggle('open');
  this.classList.toggle('open');
});
</script>
