{{ define "main" }}
<article class="blog-single">
  <header>
    {{ with .Params.pillars }}<div class="article-pillar">{{ index . 0 }}</div>{{ end }}
    <h1>{{ .Title }}</h1>
    <div class="meta">{{ .Date.Format "2006年1月2日" }}{{ with .Params.author }} · {{ . }}{{ end }}</div>
  </header>
  <div class="content">{{ .Content }}</div>
  <a href="{{ "blog/" | relURL }}" class="back">← JIWA に戻る</a>
</article>
{{ end }}
