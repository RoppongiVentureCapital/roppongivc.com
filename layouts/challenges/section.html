{{ define "main" }}
<section class="hero">
  <p class="eyebrow">Edgeプログラムの入口</p>
  <h1 style="font-size:4.5rem;letter-spacing:-0.03em;font-weight:700">Challenge</h1>
  <p style="font-family:var(--serif);font-size:1.5rem;color:var(--black);margin-top:1rem;font-weight:400">あなたの思考と能力を試す。</p>
</section>

<section class="two-col">
  <div class="two-col-left">
    <h2 class="col-heading">2つのコンテンツ</h2>
  </div>
  <div class="two-col-right">
    <div class="col-body">
      <div class="persona-card">
        <h3 style="font-size:20px">思考スタイル診断</h3>
        <p>あなたは探究型か、創造型か、事業型か。10問の質問で、自分の思考の傾向を知る。自分がどんな分野に向いているか、意外な発見があるかもしれません。</p>
        <a href="{{ "diagnosis/" | relURL }}" style="display:inline-block;margin-top:0.75rem;font-family:var(--sans);font-size:15px;font-weight:500;color:var(--black);text-decoration:underline;text-underline-offset:3px">やってみる →</a>
      </div>
      <div class="persona-card">
        <h3 style="font-size:20px">認知能力チャレンジ</h3>
        <p>パターン推理で、あなたの「地頭」を試す。3×3グリッドの法則を見抜き、欠けたピースを推理する。後半になるほど、同時に追跡すべき規則の数が増えます。</p>
        <a href="{{ "challenge/" | relURL }}" style="display:inline-block;margin-top:0.75rem;font-family:var(--sans);font-size:15px;font-weight:500;color:var(--black);text-decoration:underline;text-underline-offset:3px">やってみる →</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
