name: PR Check

on:
  pull_request:
    branches: ["main"]

jobs:
  pr-check:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for disallowed files
        run: |
          echo "=== Checking for files outside Hugo structure ==="
          DISALLOWED=$(git diff --name-only origin/main...HEAD | grep -vE '^(hugo\.toml|content/|layouts/|static/|archetypes/|i18n/|data/|assets/|themes/|\.github/|\.gitignore)' || true)
          if [ -n "$DISALLOWED" ]; then
            echo "::error::Disallowed files found in PR:"
            echo "$DISALLOWED"
            echo ""
            echo "Only Hugo site files are allowed in this public repo."
            echo "See docs/31_public_repo_rules.md for details."
            exit 1
          fi
          echo "✅ All files are within allowed Hugo directories"

      - name: Check for secrets
        run: |
          echo "=== Scanning for potential secrets ==="
          SECRETS=$(git diff origin/main...HEAD -U0 | grep -iE '(api[_-]?key|secret|token|password|credential|private[_-]?key)\s*[:=]\s*["\x27]?[A-Za-z0-9_\-]{20,}' || true)
          if [ -n "$SECRETS" ]; then
            echo "::error::Potential secrets detected in PR diff!"
            echo "Review the changes carefully before merging."
            exit 1
          fi
          echo "✅ No secrets detected"

      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build Hugo site
        run: hugo --gc --minify --buildFuture --buildDrafts
